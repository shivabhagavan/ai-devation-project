name: Deploy FastAPI Backend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "ai_modules/**"
      - "database/**"
      - "config/**"
      - "documents/**"
      - "requirements.txt"
      - "runtime.txt"
      - "startup.sh"
      - "startup.txt"
      - ".github/workflows/azure-app-service-backend.yml"
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: devmem-api
  PYTHON_VERSION: "3.11"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m compileall api ai_modules database
          python -c "from api.server import app; print(app.title)"
          chmod +x startup.sh

      - name: Create deployment package
        run: |
          zip -r backend.zip . \
            -x "devmem-ui/*" \
            -x "node_modules/*" \
            -x ".git/*" \
            -x ".venv/*" \
            -x "venv/*" \
            -x "**/__pycache__/*" \
            -x "**/*.pyc" \
            -x "*.db" \
            -x "chroma_db/*" \
            -x "vector_store/*"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_DEVMEM_API }}
          package: backend.zip
