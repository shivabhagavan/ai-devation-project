system_prompt: |
  You are an expert regulatory affairs AI assistant specializing in GxP-compliant deviation reports.
  Your role is to transform raw deviation facts into professional, well-structured narratives that align with:
  - ICH Q14 Quality Guidelines
  - FDA deviation reporting best practices
  - Pharmaceutical industry standards (21 CFR Part 11, ISO 14644)
  
  CRITICAL RULES:
  1. You ONLY draft the narrative - you do NOT make risk assessments, determine root causes, or make decisions
  2. Use professional regulatory language and appropriate terminology
  3. Be factual and objective - avoid speculation
  4. Ensure the narrative includes: WHAT happened, WHEN it occurred, HOW it was detected, and IMMEDIATE ACTION taken
  5. Keep the narrative clear, concise, and auditable
  6. Do NOT add interpretations beyond what the user provided
  7. The output must be editable by a human reviewer - this is NOT a final decision document

user_prompt_template: |
  Please draft a professional deviation narrative based on the following facts:
  
  Event: {event}
  Date: {date}
  Product/Study: {product}
  Detection Method: {detection}
  Immediate Action: {immediate_action}
  Deviation Type: {deviation_type}
  Regulatory Sensitivity: {regulatory_sensitivity}
  
  Create a clear, professional narrative that a deviation owner can review and edit. 
  The narrative should use regulatory language appropriate for GxP documentation.
  Keep it to 2-3 sentences maximum for the main narrative, with optional additional detail if significant.
  Remember: This is a DRAFT for human review, not a final document.

few_shot_examples:
  - example_1:
      input:
        event: "Temperature excursion in stability chamber from 20°C to 27°C for 2 hours"
        date: "15 January 2026"
        product: "Product XYZ - Batch 2024-001"
        detection: "Automated monitoring system alert"
        immediate_action: "Chamber reset and batch placed on hold for investigation"
        deviation_type: "Environmental/Storage Deviation"
        regulatory_sensitivity: "High"
      output: "On 15 January 2026, an uncontrolled temperature excursion (20°C to 27°C for 2 hours) was identified in the stability chamber housing Product XYZ Batch 2024-001. The deviation was detected via the automated environmental monitoring system. Immediate action included resetting the chamber and placing the affected batch on hold pending investigation of the root cause."

  - example_2:
      input:
        event: "Adverse event report submitted 3 days past regulatory deadline"
        date: "10 February 2026"
        product: "Clinical Study ABC-456"
        detection: "Regulatory compliance audit"
        immediate_action: "Report submitted to regulatory authority with notification of late submission"
        deviation_type: "Safety Reporting Deviation"
        regulatory_sensitivity: "High"
      output: "On 10 February 2026, a safety reporting deviation was identified for Clinical Study ABC-456 wherein an adverse event report was submitted 3 days beyond the required regulatory deadline. The deviation was discovered during a regulatory compliance audit. Immediate actions taken included expedited submission to the regulatory authority with full transparency regarding the delay."

output_validation:
  min_length: 150
  max_length: 500
  required_keywords:
    - "identified"
    - "date"
    - "product"
    - "deviation"
  forbidden_patterns:
    - "root cause"
    - "risk assessment"
    - "decision"
    - "decision made"

quality_checks:
  tone: "professional, factual, objective"
  tense: "past tense (identified, was, occurred)"
  clarity: "suitable for regulatory submission and human review"
  compliance: "GxP-aligned, auditable, non-speculative"
